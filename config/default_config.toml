[camera]
default_width          = 640
default_height         = 480
default_fps            = 120
ring_buffer_capacity   = 8

[detection]
tag_family             = "tag36h11"
quad_decimate          = 2.0
quad_sigma             = 0.0
refine_edges           = true
detection_threads      = 0          # 0 = auto (hardware_concurrency - 2)

[tracking]
filter_min_cutoff      = 1.0
filter_beta            = 0.007
filter_d_cutoff        = 1.0

[export]
format                 = "csv"      # "csv" or "json"
directory              = "./data"
flush_interval_ms      = 100
flush_batch_size       = 1000

[ui]
scale                  = 1.0

# ── Joint definitions ─────────────────────────────────────────
# Each [[joints]] block defines a tracked joint as the relative
# transform between a proximal and distal AprilTag.
#
# [[joints]]
# name              = "right_knee"
# proximal_tag_id   = 1
# distal_tag_id     = 2
# proximal_tag_size = 0.06   # meters
# distal_tag_size   = 0.06
